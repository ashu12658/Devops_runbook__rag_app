services:
  - type: web
    name: Devops Runbook Rag Application
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.14.0"

    autoDeploy: true
    branch: main
